name: Deploy

on:
  push:
    branches: [main]

# Only one deploy can run at a time; cancel any in-progress run if a newer
# commit is pushed before it finishes.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  id-token: write   # needed for OIDC token exchange
  contents: read

jobs:
  # ── Build + push backend image ────────────────────────────────────────────────
  backend:
    name: Backend — build & push to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push Docker image
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: checkdk-backend
          SHA: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$SHA"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Ensure App Runner is running, then deploy
        env:
          SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          STATUS=$(aws apprunner describe-service \
            --service-arn "$SERVICE_ARN" \
            --query 'Service.Status' --output text)
          echo "Current App Runner status: $STATUS"

          if [ "$STATUS" = "PAUSED" ]; then
            echo "Resuming paused service..."
            aws apprunner resume-service --service-arn "$SERVICE_ARN"
          fi

          # Wait until RUNNING for any non-RUNNING state (PAUSED, OPERATION_IN_PROGRESS, etc.)
          if [ "$STATUS" != "RUNNING" ]; then
            echo "Waiting for service to reach RUNNING state..."
            for i in $(seq 1 36); do
              sleep 10
              STATUS=$(aws apprunner describe-service \
                --service-arn "$SERVICE_ARN" \
                --query 'Service.Status' --output text)
              echo "  [$i/36] Status: $STATUS"
              [ "$STATUS" = "RUNNING" ] && break
            done
          fi

          if [ "$STATUS" != "RUNNING" ]; then
            echo "ERROR: Service did not reach RUNNING state in time (last status: $STATUS)"
            exit 1
          fi

          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
          echo "Deployment triggered — App Runner will pick up the new :latest image."

  # ── Build + deploy frontend ───────────────────────────────────────────────────
  frontend:
    name: Frontend — build & deploy to S3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Production API URL — CloudFront strips /api and forwards to App Runner
          VITE_API_URL: /api

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "env-config.js"
          # HTML + env config must never be cached
          aws s3 cp dist/index.html "s3://${{ secrets.S3_BUCKET }}/index.html" \
            --cache-control "no-store,no-cache,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DIST_ID }}" \
            --paths "/*"

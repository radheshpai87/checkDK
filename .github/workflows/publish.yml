name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # create GitHub Release
  id-token: write       # OIDC – trusted PyPI publishing

jobs:
  # ── 1. Publish CLI to PyPI ──────────────────────────────────────────────────
  pypi:
    name: Publish checkdk-cli to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/checkdk-cli/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build distribution
        working-directory: cli
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

  # ── 2. Create GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for changelog generation

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog (last 20 commits)
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --oneline --no-merges | head -40)
          else
            CHANGES=$(git log --oneline --no-merges | head -40)
          fi
          echo "CHANGES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES"     >> "$GITHUB_OUTPUT"
          echo "EOF"          >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "checkDK v${{ steps.version.outputs.VERSION }}"
          body: |
            ## What's new in v${{ steps.version.outputs.VERSION }}

            ${{ steps.changelog.outputs.CHANGES }}

            ---

            ### Install the CLI

            ```bash
            pip install checkdk-cli==${{ steps.version.outputs.VERSION }}
            ```

            Or upgrade an existing installation:

            ```bash
            pip install --upgrade checkdk-cli
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}



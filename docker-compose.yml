services:

  # ── Backend (FastAPI + ML + LLM) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: checkdk-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - .env                    # MISTRAL_API_KEY, GROQ_API_KEY, CORS_ORIGINS, etc.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Frontend (React + nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: checkdk-frontend:latest
    ports:
      - "3000:80"
    environment:
      # /api is the nginx proxy path — the browser calls /api/* and nginx
      # forwards it to http://backend:8000/*. Never expose the Docker-internal
      # hostname (backend:8000) to the browser — it won't resolve.
      - CHECKDK_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

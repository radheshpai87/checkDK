services:

  # ── Backend (FastAPI + ML + LLM) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: checkdk-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - .env                    # MISTRAL_API_KEY, GROQ_API_KEY, CORS_ORIGINS, etc.
    environment:
      # Explicitly forwarded so the backend always gets the right values
      # regardless of env_file parsing quirks.
      - FRONTEND_URL=http://localhost:3000
      - APP_BASE_URL=http://localhost:3000
      - OAUTH_CALLBACK_BASE=http://localhost:3000/api
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - DYNAMODB_REGION=${DYNAMODB_REGION:-us-east-1}
      - DYNAMODB_USERS_TABLE=${DYNAMODB_USERS_TABLE:-checkdk_users}
      - DYNAMODB_HISTORY_TABLE=${DYNAMODB_HISTORY_TABLE:-checkdk_history}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Frontend (React + nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: checkdk-frontend:latest
    ports:
      - "3000:80"
    environment:
      # /api is the nginx proxy path — the browser calls /api/* and nginx
      # forwards it to http://backend:8000/*. Never expose the Docker-internal
      # hostname (backend:8000) to the browser — it won't resolve.
      - CHECKDK_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

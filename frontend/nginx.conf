server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from using its own port (80) when issuing absolute redirects
    # (e.g. the trailing-slash redirect on directories). Without this, a request
    # to /auth/callback through the docker port mapping :3000→:80 would redirect
    # the browser to http://localhost/auth/callback/ (port 80) instead of keeping
    # it on port 3000.
    absolute_redirect off;

    # ── API proxy ──────────────────────────────────────────────────────────────
    # Requests to /api/* are forwarded to the backend container.
    # The /api prefix is stripped so  /api/health → http://backend:8000/health
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── OAuth callback — serve the SPA so React Router handles the hash token ──
    # The hash fragment (#token=...) is never sent to nginx; the browser keeps it.
    # We just need to serve index.html and let AuthCallbackPage read window.location.hash.
    location = /auth/callback {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # All other routes are handled by React Router (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Runtime env config — never cache ──────────────────────────────────────
    # env-config.js is generated fresh at each container start by env.sh.
    # It must not be cached or browsers will use a stale CHECKDK_API_URL.
    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    # Vite hashes all JS/CSS filenames so 1-year immutable cache is safe for them.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
